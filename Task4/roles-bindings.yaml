#
# --- CLUSTER ROLES
#
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata: { name: viewer }
rules:
  - apiGroups: ["", "apps"]
    resources: ["pods", "services", "deployments"]
    verbs: ["get","list","watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata: { name: devops-role }
rules:
  - apiGroups: ["", "apps","batch","extensions","networking.k8s.io"]
    resources: ["namespaces","deployments","statefulsets","services","ingresses",
                "persistentvolumeclaims","serviceaccounts","jobs","cronjobs"]
    verbs: ["*"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata: { name: secrets-manager }
rules:
  - apiGroups: [""]
    resources: ["secrets","configmaps"]
    verbs: ["get","list","create","update","delete"]

#
# --- NAMESPACE ROLES (default)
#
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: dev-role
  namespace: default
rules:
  - apiGroups: ["", "apps"]
    resources: ["pods","services","deployments"]
    verbs: ["get","list","create","update","delete"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ops-role
  namespace: default
rules:
  - apiGroups: ["", "apps"]
    resources: ["pods","services","deployments"]
    verbs: ["get","list","create","update","delete"]
  - apiGroups: [""]
    resources: ["pods/log","pods/exec"]
    verbs: ["get"]

#
# --- BINDINGS
#
# Read-only аналитик
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata: { name: viewer-binding }
subjects:
  - kind: User
    name: analyst
    apiGroup: rbac.authorization.k8s.io
roleRef: { kind: ClusterRole, name: viewer, apiGroup: rbac.authorization.k8s.io }

---
# Dev-разработчик в default
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: dev-binding
  namespace: default
subjects:
  - kind: User
    name: developer
    apiGroup: rbac.authorization.k8s.io
roleRef: { kind: Role, name: dev-role, apiGroup: rbac.authorization.k8s.io }

---
# Ops-инженер в default
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ops-binding
  namespace: default
subjects:
  - kind: User
    name: operator
    apiGroup: rbac.authorization.k8s.io
roleRef: { kind: Role, name: ops-role, apiGroup: rbac.authorization.k8s.io }

---
# DevOps – админ без Secret
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata: { name: devops-binding }
subjects:
  - kind: User
    name: devops
    apiGroup: rbac.authorization.k8s.io
roleRef: { kind: ClusterRole, name: devops-role, apiGroup: rbac.authorization.k8s.io }

---
# Security – управление Secret/ConfigMap
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata: { name: secrets-binding }
subjects:
  - kind: User
    name: security
    apiGroup: rbac.authorization.k8s.io
roleRef: { kind: ClusterRole, name: secrets-manager, apiGroup: rbac.authorization.k8s.io }

---
# Полный кластер-администратор
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata: { name: admin-binding }
subjects:
  - kind: User
    name: admin
    apiGroup: rbac.authorization.k8s.io
roleRef: { kind: ClusterRole, name: cluster-admin, apiGroup: rbac.authorization.k8s.io }
